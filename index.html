<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-to-do-website</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <div class="side_bar">
      <button class="menu_button animate__animated animate__fadeInDown">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
      </button>
      <hr />
      <button>
        <img
          src="./images/list-todo 1.png"
          alt=""
          class="animate__animated animate__fadeInDown"
        />
      </button>
      <button>
        <img
          src="./images/menu settings.png"
          alt=""
          class="animate__animated animate__fadeInDown"
        />
      </button>
    </div>
    <div class="main animate__animated animate__fadeInDown">
      <h1>My Tasks</h1>
      <div class="buttonContainer">
        <input placeholder="Type your task here.." type="text" />
        <div class="buttonContainer3">
          <button class="cssbuttons-io-button add_btn">
            <svg
              height="24"
              width="24"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="M0 0h24v24H0z" fill="none"></path>
              <path
                d="M11 11V5h2v6h6v2h-6v6h-2v-6H5v-2z"
                fill="currentColor"
              ></path>
            </svg>
            <span>Add</span>
          </button>
        </div>
      </div>
      <div class="container2 animate__animated animate__fadeInDown">
        <img src="./images/selfie 1.png" alt="selfie_guy" />
        <h3>What are you up to today?</h3>
      </div>
      <div class="container1">
        <div class="buttonContainer1">
          <span
            ><button class="diplay_all">All</button> |
            <button class="display_active">Active</button> |
            <button class="display_completed">Completed</button></span
          >
          <span><span class="num_of_tasks">0</span> tasks left</span>
        </div>
        <div class="task_list"></div>
      </div>
    </div>
    <script src="./JS/script.js"></script>
  </body>
</html>
